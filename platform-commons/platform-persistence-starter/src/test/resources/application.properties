# ===========================================================================
# Spring
# ===========================================================================
spring.application.name=platform-commons-persistence-test-application
# ===========================================================================
# Platform
# ===========================================================================
# \u5F00\u542F\u8C03\u8BD5\u6A21\u5F0F
platform.commons.debug=true
# TimeZone
platform.commons.user-zone-id=+08:00
platform.commons.system-zone-id=+08:00
# IdWorker
platform.id.application-name=${spring.application.name}
platform.id.application-port=${server.port}
platform.id.application-pid=${PID}
platform.id.type=auto
platform.id.datacenter-id=1
platform.id.worker-id=1
# JWT
platform.jwt.secret=GerMgOsSNdAofwXfILuKAvWCpwGLObyj
platform.jwt.access-token-expire=3600
platform.jwt.refresh-token-expire=7200
# ===========================================================================
# DataBase & DataSource
# ===========================================================================
# DataSource
spring.datasource.name=master
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/platform?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
# ===========================================================================
# Spring Cache & Redis
# ===========================================================================
# Cache
spring.cache.type=redis
# Redis
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.database=11
