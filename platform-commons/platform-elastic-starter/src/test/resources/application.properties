# ===========================================================================
# Spring
# ===========================================================================
spring.application.name=platform-commons-elastic-test-application
# ===========================================================================
# DataSource
# ===========================================================================
spring.datasource.name=master
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/platform?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
# ===========================================================================
# ElasticSearch
# ===========================================================================
spring.elasticsearch.rest.uris=http://127.0.0.1:9200
