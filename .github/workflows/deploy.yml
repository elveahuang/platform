name: Build and Deploy
on:
    push:
        branches: [ main ]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Setup Gradle
                uses: gradle/gradle-build-action@v3
            -   name: Build
                run: |
                    java -version
                    gradle -v
            -   name: Build with Gradle
                run: ./gradlew build
